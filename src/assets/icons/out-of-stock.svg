<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Box bottom body -->
  <rect x="6" y="26" width="36" height="18" rx="4" fill="#FEE2E2"/>
  <!-- Box front upper section -->
  <rect x="6" y="26" width="36" height="8" rx="4" fill="#FCA5A5"/>
  <!-- Left flap (open, angled up) -->
  <path d="M6 26 L6 10 L18 16 L18 26 Z" fill="#FCA5A5"/>
  <path d="M6 10 L18 16" stroke="#FECACA" stroke-width="1" opacity="0.5"/>
  <!-- Right flap (open, angled up) -->
  <path d="M42 26 L42 10 L30 16 L30 26 Z" fill="#FECACA"/>
  <path d="M42 10 L30 16" stroke="#FECACA" stroke-width="1" opacity="0.5"/>
  <!-- X marks inside box (empty) -->
  <path d="M17 34 L31 34" stroke="#DC2626" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M20 30 L28 38" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M28 30 L20 38" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round"/>
  <!-- "Empty" indicator - dashed outline -->
  <rect x="7" y="27" width="34" height="16" rx="3" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
</svg>
