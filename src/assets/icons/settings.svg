<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gear base circle -->
  <circle cx="24" cy="24" r="13" fill="#475569"/>
  <!-- 8 gear teeth (rotated rects, centered at top at y=2) -->
  <rect x="20.5" y="2" width="7" height="10" rx="2" fill="#475569" transform="rotate(0 24 24)"/>
  <rect x="20.5" y="2" width="7" height="10" rx="2" fill="#475569" transform="rotate(45 24 24)"/>
  <rect x="20.5" y="2" width="7" height="10" rx="2" fill="#475569" transform="rotate(90 24 24)"/>
  <rect x="20.5" y="2" width="7" height="10" rx="2" fill="#475569" transform="rotate(135 24 24)"/>
  <rect x="20.5" y="2" width="7" height="10" rx="2" fill="#475569" transform="rotate(180 24 24)"/>
  <rect x="20.5" y="2" width="7" height="10" rx="2" fill="#475569" transform="rotate(225 24 24)"/>
  <rect x="20.5" y="2" width="7" height="10" rx="2" fill="#475569" transform="rotate(270 24 24)"/>
  <rect x="20.5" y="2" width="7" height="10" rx="2" fill="#475569" transform="rotate(315 24 24)"/>
  <!-- Inner ring -->
  <circle cx="24" cy="24" r="9" fill="#64748B"/>
  <!-- Center highlight -->
  <circle cx="24" cy="24" r="4.5" fill="#CBD5E1"/>
</svg>
