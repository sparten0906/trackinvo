<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Clock face outer -->
  <circle cx="24" cy="24" r="21" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3"/>
  <!-- Clock face inner highlight -->
  <circle cx="24" cy="24" r="17" fill="#FFFBEB"/>
  <!-- Hour markers (dots) -->
  <circle cx="24" cy="6.5" r="2" fill="#D97706"/>
  <circle cx="41.5" cy="24" r="2" fill="#D97706"/>
  <circle cx="24" cy="41.5" r="2" fill="#D97706"/>
  <circle cx="6.5" cy="24" r="2" fill="#D97706"/>
  <!-- Minor markers -->
  <circle cx="35" cy="9.5" r="1.5" fill="#FCD34D"/>
  <circle cx="38.5" cy="35" r="1.5" fill="#FCD34D"/>
  <circle cx="13" cy="38.5" r="1.5" fill="#FCD34D"/>
  <circle cx="9.5" cy="13" r="1.5" fill="#FCD34D"/>
  <!-- Hour hand (pointing ~10 o'clock) -->
  <rect x="22.5" y="12" width="3" height="13" rx="1.5" fill="#92400E" transform="rotate(-30 24 24)"/>
  <!-- Minute hand (pointing ~12 o'clock) -->
  <rect x="22.5" y="8" width="3" height="17" rx="1.5" fill="#B45309"/>
  <!-- Center knob -->
  <circle cx="24" cy="24" r="3.5" fill="#D97706"/>
  <circle cx="24" cy="24" r="1.5" fill="#FEF3C7"/>
</svg>
