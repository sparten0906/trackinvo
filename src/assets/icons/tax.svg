<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main coin (large) -->
  <circle cx="22" cy="28" r="18" fill="#EAB308"/>
  <circle cx="22" cy="28" r="14" fill="#FDE047"/>
  <!-- Coin inner glow ring -->
  <circle cx="22" cy="28" r="10" fill="none" stroke="#CA8A04" stroke-width="1.5" opacity="0.5"/>
  <!-- % symbol - top circle -->
  <circle cx="17.5" cy="23.5" r="3.5" fill="none" stroke="#92400E" stroke-width="2.5"/>
  <!-- % symbol - bottom circle -->
  <circle cx="26.5" cy="32.5" r="3.5" fill="none" stroke="#92400E" stroke-width="2.5"/>
  <!-- % symbol - diagonal line -->
  <line x1="27.5" y1="21" x2="16.5" y2="36" stroke="#92400E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Small sparkle coin (top right) -->
  <circle cx="40" cy="11" r="6" fill="#FDE047" stroke="#EAB308" stroke-width="2"/>
  <circle cx="40" cy="11" r="2.5" fill="#EAB308"/>
</svg>
